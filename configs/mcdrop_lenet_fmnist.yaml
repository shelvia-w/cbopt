optimizer: mcdrop
dataset: fmnist
model: lenet_mcdrop
seeds: [0, 1, 2]
device: cuda

traindir: "final/mcdrop/fmnist_lenet/lr_5e-3_wd_1e-5"

train_args:
  lr: "5e-3"
  e: "100"
  weight-decay: "1e-5"
  beta1: "0.9"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"
  tr: "64"

test_flags:
  - pd
