# MC Dropout configuration
# Train: qsub -v CONFIG=configs/mcdrop.yaml pbs/train.pbs
# Test:  qsub -v CONFIG=configs/mcdrop.yaml pbs/test.pbs
# OOD:   qsub -v CONFIG=configs/mcdrop.yaml pbs/ood.pbs

optimizer: mcdrop
dataset: cifar10
model: resnet20_mcdrop
seeds: [0, 1, 2, 3, 4]
device: cuda

# Result directory relative to /scratch/$USER/cbo_results/
traindir: "mcdrop/cifar10_resnet20_mcdrop/lr_4e-1_wd_2e-4_tf_0.2_nr_0.4"

# --- Training arguments ---
train_args:
  lr: "4e-1"
  e: "200"
  weight-decay: "2e-4"
  beta1: "0.9"
  tbatch: "50"
  vbatch: "50"
  tvsplit: "1.0"
  j: "0"
  tf: "0.2"
  nr: "0.4"
train_flags: []

# --- Evaluation arguments ---
seed_start: 0
seed_end: 4
eval_subdir: "eval"
test_args:
  tr: "64"       # MC samples at test time
test_flags:
  - pd

# --- OOD evaluation ---
ood_dataset: svhn
ood_testsamples: 1
ood_testrepeat: 64
