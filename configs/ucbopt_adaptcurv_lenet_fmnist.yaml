optimizer: ucbopt_adaptcurv
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ucbopt_adaptcurv/fmnist_lenet/lr_1e-2_wd_2e-3_h0_0.05_gamma_5e-1_b3_1.001_ep_100"

train_args:
  lr: "1e-2"
  e: "100"
  weight-decay: "2e-3"
  hess_init: "0.05"
  gamma: "5e-1"
  beta1: "0.9"
  beta2: "0.99999"
  beta3: "1.001"
  eps: "1e-8"
  clip-radius: "inf"
  tvsplit: "0.9"
  tbatch: "128"
  vbatch: "256"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"
  checkpoint: "best"

test_flags:
  - pd
