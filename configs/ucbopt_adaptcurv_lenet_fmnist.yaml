optimizer: ucbopt_adaptcurv
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ucbopt_adaptcurv/fmnist_lenet/lr_5e-2_wd_1e-4_h0_1.0_gamma_5e-2_b3_0.99999_ep_100"

train_args:
  lr: "5e-2"
  e: "100"
  weight-decay: "1e-4"
  hess_init: "1.0"
  gamma: "5e-2"
  beta1: "0.9"
  beta2: "0.99999"
  beta3: "0.99999"
  eps: "1e-8"
  clip_radius: "inf"
  tvsplit: "0.9"
  tbatch: "128"
  vbatch: "256"
  j: "1"

train_flags:
  - rescale_lr

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"

test_flags:
  - pd
