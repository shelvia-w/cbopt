optimizer: ivon
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ivon/lenet_fmnist/lr_5e-2_wd_1e-3_h0_0.5"

train_args:
  lr: "5e-2"
  e: "100"
  weight-decay: "1e-3"
  ess: "54000"
  hess_init: "0.5"
  mc_samples: "1"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval_mean"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"
  tr: "1"

test_flags:
  - pd
