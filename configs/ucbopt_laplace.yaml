# UCBOpt + Laplace approximation configuration
# Train: qsub -v CONFIG=configs/ucbopt_laplace.yaml pbs/train.pbs
# Test:  qsub -v CONFIG=configs/ucbopt_laplace.yaml pbs/test.pbs
# OOD:   qsub -v CONFIG=configs/ucbopt_laplace.yaml pbs/ood.pbs

optimizer: ucbopt_laplace
dataset: cifar10
model: resnet20
seeds: [0, 1, 2, 3, 4]
device: cuda

traindir: "ucbopt_laplace/cifar10_resnet20/lr_3.5_wd_2e-4_h0_0.5_curv_5e-6_tf_0.05"

# --- Training arguments ---
train_args:
  lr: "3.5"
  lr_final: "0.0"
  e: "200"
  warmup: "5"
  weight-decay: "2e-4"
  beta1: "0.9"
  beta2: "0.99999"
  hess_init: "0.5"
  cand_curvature: "5e-6"
  tbatch: "50"
  vbatch: "50"
  tvsplit: "1.0"
  j: "0"
  tf: "0.05"
  subset_of_weights: "last_layer"
  hessian_structure: "diag"
  pred_type: "glm"
  link_approx: "probit"
  n_samples: "64"
  prior_precision: "10"
train_flags:
  - rescale_lr

# --- Evaluation arguments ---
seed_start: 0
seed_end: 4
eval_subdir: "eval"
test_args:
  pred_type: "glm"
  link_approx: "probit"
  n_samples: "64"
test_flags:
  - pd

# --- OOD evaluation ---
ood_dataset: svhn
ood_testsamples: 1
ood_testrepeat: 64
