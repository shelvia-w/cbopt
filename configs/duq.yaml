# DUQ (Deterministic Uncertainty Quantification) configuration
# Train: qsub -v CONFIG=configs/duq.yaml pbs/train.pbs
# Test:  qsub -v CONFIG=configs/duq.yaml pbs/test.pbs
#
# NOTE: test_duq.py takes MODEL as a 2nd positional arg (TRAINDIR MODEL DATASET).
# test_positional_model: true handles this in run_test.sh.

optimizer: duq
dataset: cifar10
model: resnet20
seeds: [0, 1, 2, 3, 4]
device: cuda

traindir: "duq/cifar10_resnet20/lr_1e-1_cd_64_ls_0.1_lambda_0.01_wd_2e-4"

# --- Training arguments ---
train_args:
  lr: "1e-1"
  e: "200"
  weight-decay: "2e-4"
  centroid_dim: "64"
  length_scale: "0.1"
  beta: "0.99"
  lambda_gp: "0.01"
  tbatch: "50"
  vbatch: "50"
  tvsplit: "1.0"
  j: "0"
train_flags:
  - pd    # progress display (also used during training for duq)

# --- Evaluation arguments ---
# test_duq.py signature: TRAINDIR MODEL DATASET ...
test_positional_model: true
seed_start: 0
seed_end: 4
eval_subdir: "eval"
test_flags:
  - pd

# --- OOD evaluation ---
ood_dataset: svhn
ood_testsamples: 1
ood_testrepeat: 1
