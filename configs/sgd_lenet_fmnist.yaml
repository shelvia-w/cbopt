optimizer: sgd
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/sgd/{dataset}_{model}/lr_{lr}_wd_{weight-decay}"

train_args:
  lr: "5e-3"
  e: "100"
  weight-decay: "1e-5"
  beta1: "0.9"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval"
test_flags:
  - pd
