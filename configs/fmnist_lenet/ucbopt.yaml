dataset: fmnist
model: lenet
method: ucbopt
epochs: 100
batch_size: 128
eval_batch_size: 256
learning_rate: 1e-2
lr_final: 0.0
weight_decay: 2e-3
warmup_epochs: 5
random_seed: 0
data_dir: data
output_dir: outputs/fmnist_lenet/ucbopt/seed0
evaluation: {indomain: true, ood: true, ood_dataset: emnist}
method_hparams: {beta1: 0.9, beta2: 0.99999, hess_init: 0.05, cand_curvature: 8e-6, rescale_lr: false}
