optimizer: laplace
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/laplace/fmnist_lenet/lr_5e-3_wd_1e-5"

train_args:
  lr: "5e-3"
  e: "100"
  weight-decay: "1e-5"
  momentum: "0.9"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"
  prior_precision: "0.54"
  subset_of_weights: "last_layer"
  hessian_structure: "kron"
  pred_type: "glm"
  link_approx: "probit"
  n_samples: "100"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval_final"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"
  tr: "64"
  checkpoint: "latest"

test_flags:
  - pd

ood_subdir: "ood_eval_final"

ood_args:
  ood_dataset: "kmnist"
  batch: "256"
  j: "0"
  checkpoint: "latest"
  pred_type: "glm"
  link_approx: "probit"
  n_samples: "100"

ood_flags:
  - so
