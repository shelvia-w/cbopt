optimizer: ucbopt
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ucbopt/fmnist_lenet/lr_1e-2_wd_2e-3_h0_0.0_curv_0.0_ep_100"

train_args:
  lr: "1e-2"
  e: "100"
  weight-decay: "2e-3"
  hess_init: "0.0"
  cand_curvature: "0.0"
  beta1: "0.9"
  beta2: "0.99999"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags:
  - no_hess_init

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"
  checkpoint: "best"

test_flags:
  - pd
