optimizer: ucbopt
dataset: fmnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ucbopt/fmnist_lenet/lr_5e-2_wd_1e-3_h0_0.2_curv_1e-8_ep_100"

train_args:
  lr: "5e-2"
  e: "100"
  weight-decay: "1e-3"
  hess_init: "0.2"
  cand_curvature: "1e-8"
  beta1: "0.9"
  beta2: "0.99999"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"

test_flags:
  - pd
