# Laplace approximation configuration
# Train: qsub -v CONFIG=configs/laplace.yaml pbs/train.pbs
# Test:  qsub -v CONFIG=configs/laplace.yaml pbs/test.pbs

optimizer: laplace
dataset: cifar10
model: resnet20
seeds: [0, 1, 2, 3, 4]
device: cuda

traindir: "laplace/cifar10_resnet20/lr_4e-1_wd_2e-4_tf_0.2_nr_0.4"

# --- Training arguments ---
train_args:
  lr: "4e-1"
  e: "200"
  weight-decay: "2e-4"
  momentum: "0.9"
  tbatch: "50"
  vbatch: "50"
  tvsplit: "1.0"
  j: "0"
  tf: "0.2"
  nr: "0.4"
train_flags: []

# --- Evaluation arguments ---
seed_start: 0
seed_end: 4
eval_subdir: "eval"
test_args: {}
test_flags:
  - pd

# --- OOD evaluation ---
ood_dataset: svhn
ood_testsamples: 1
ood_testrepeat: 1
