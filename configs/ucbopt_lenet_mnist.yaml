optimizer: ucbopt
dataset: mnist
model: lenet
seeds: [0, 1, 2]
device: cuda

traindir: "final/ucbopt/mnist_lenet/lr_1e-1_wd_1e-3_h0_0.1_curv_1e-6_ep_100"

train_args:
  lr: "1e-1"
  e: "100"
  weight-decay: "1e-3"
  hess_init: "0.1"
  cand_curvature: "1e-6"
  beta1: "0.9"
  beta2: "0.99999"
  tbatch: "128"
  vbatch: "256"
  tvsplit: "0.9"
  j: "1"

train_flags: []

seed_start: 0
seed_end: 2
eval_subdir: "eval"

test_args:
  tvsplit: "1.0"
  batch: "256"
  j: "0"

test_flags:
  - pd
